project:
  type: website
  output-dir: docs
  render:
    - "*.qmd"
  resources:
    - assets/

website:
  title: "Orlando Willig"
  description: "Orlando Willig – Junior Prüfungsexperte und Data Analyst bei der Eidgenössischen Finanzkontrolle (EFK), Schweiz. Schwerpunkte: Performance Audit, Data Analytics, KI-Governance."
  site-url: "https://orlandowillig.github.io"
  favicon: assets/favicon.svg
  open-graph: true
  navbar:
    logo: assets/favicon.svg
    left:
      - href: index.qmd
        text: Start
      - href: about.qmd
        text: Über mich
      - href: masterarbeit.qmd
        text: Masterarbeit
      - href: publikationen.qmd
        text: Publikationen
      - href: projekte.qmd
        text: Projekte
      - href: kontakt.qmd
        text: Kontakt
  page-footer:
    center: "© 2026 Orlando Willig · Erstellt mit [Quarto](https://quarto.org)"

format:
  html:
    theme:
      - darkly
      - styles.scss
    toc: false
    smooth-scroll: true
    grid:
      body-width: 1000px
    include-in-header:
      - assets/head.html
      - assets/tracking.html
    mainfont: "Inter, system-ui, sans-serif"
    monofont: "JetBrains Mono, monospace"
